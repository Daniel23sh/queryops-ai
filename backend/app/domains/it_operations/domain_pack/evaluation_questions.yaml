    {"id":"itops-medium-006","question":"Show users in privileged groups by department.","category":"access","difficulty":"medium","case_type":"free_query","requesting_role":"admin","required_scope_type":"global","scope_mode":"global","expected_outcome":"success","expected_tables":["departments","directory_users","groups","user_group_memberships"],"expected_columns":{"departments":["id","name"],"directory_users":["id","department_id"],"groups":["id","is_privileged"],"user_group_memberships":["user_id","group_id"]},"baseline_sql":"SELECT d.name AS department_name, COUNT(DISTINCT du.id) AS user_count FROM departments d JOIN directory_users du ON du.department_id = d.id JOIN user_group_memberships ugm ON ugm.user_id = du.id JOIN groups g ON g.id = ugm.group_id WHERE g.is_privileged = true GROUP BY d.name ORDER BY d.name","requires_join":true,"clarification_expected":false,"security_sensitive":true,"comparison_mode":"grouped_rows","numeric_tolerance":null,"stable_key_columns":[],"template_id":null},

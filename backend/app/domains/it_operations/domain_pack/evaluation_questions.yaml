    {"id":"itops-medium-015","question":"Show recent group membership additions in privileged groups.","category":"access","difficulty":"medium","case_type":"free_query","requesting_role":"analyst","required_scope_type":"department","scope_mode":"assigned","expected_outcome":"success","expected_tables":["groups","user_group_memberships"],"expected_columns":{"groups":["id","name","is_privileged"],"user_group_memberships":["user_id","group_id","added_at"]},"baseline_sql":"SELECT ugm.user_id, g.name AS group_name, ugm.added_at FROM user_group_memberships ugm JOIN groups g ON g.id = ugm.group_id WHERE g.is_privileged = true AND ugm.added_at >= CURRENT_TIMESTAMP - INTERVAL '30 days' ORDER BY ugm.added_at, ugm.user_id","requires_join":true,"clarification_expected":false,"security_sensitive":true,"comparison_mode":"unordered_rows","numeric_tolerance":null,"stable_key_columns":[],"template_id":null},

    {"id":"itops-hard-001","question":"Which inactive privileged users still have active paid licenses?","category":"risk","difficulty":"hard","case_type":"free_query","requesting_role":"analyst","required_scope_type":"department","scope_mode":"assigned","expected_outcome":"success","expected_tables":["directory_users","groups","license_assignments","licenses","user_group_memberships"],"expected_columns":{"directory_users":["id","last_login_at"],"groups":["id","is_privileged"],"license_assignments":["id","user_id","license_id","status"],"licenses":["id","monthly_cost_usd"],"user_group_memberships":["user_id","group_id"]},"baseline_sql":"SELECT DISTINCT du.id AS user_id, la.id AS assignment_id, l.monthly_cost_usd FROM directory_users du JOIN user_group_memberships ugm ON ugm.user_id = du.id JOIN groups g ON g.id = ugm.group_id JOIN license_assignments la ON la.user_id = du.id JOIN licenses l ON l.id = la.license_id WHERE g.is_privileged = true AND la.status = 'active' AND (du.last_login_at IS NULL OR du.last_login_at < CURRENT_TIMESTAMP - INTERVAL '90 days') ORDER BY du.id, la.id","requires_join":true,"clarification_expected":false,"security_sensitive":true,"comparison_mode":"unordered_rows","numeric_tolerance":"0.01","stable_key_columns":[],"template_id":null},
    {"id":"itops-hard-002","question":"Which terminated employees are still in privileged groups and own active devices?","category":"risk","difficulty":"hard","case_type":"free_query","requesting_role":"analyst","required_scope_type":"department","scope_mode":"assigned","expected_outcome":"success","expected_tables":["devices","directory_users","groups","user_group_memberships"],"expected_columns":{"devices":["id","assigned_user_id"],"directory_users":["id","employee_status"],"groups":["id","is_privileged"],"user_group_memberships":["user_id","group_id"]},"baseline_sql":"SELECT DISTINCT du.id AS user_id, d.id AS device_id FROM directory_users du JOIN user_group_memberships ugm ON ugm.user_id = du.id JOIN groups g ON g.id = ugm.group_id JOIN devices d ON d.assigned_user_id = du.id WHERE du.employee_status = 'terminated' AND g.is_privileged = true ORDER BY du.id, d.id","requires_join":true,"clarification_expected":false,"security_sensitive":true,"comparison_mode":"unordered_rows","numeric_tolerance":null,"stable_key_columns":[],"template_id":null},
    {"id":"itops-hard-003","question":"Which departments have both unused licenses and open support tickets?","category":"operations","difficulty":"hard","case_type":"free_query","requesting_role":"admin","required_scope_type":"global","scope_mode":"global","expected_outcome":"success","expected_tables":["departments","license_assignments","support_tickets"],"expected_columns":{"departments":["id","name"],"license_assignments":["department_id","status","is_mandatory","last_used_at"],"support_tickets":["department_id","status"]},"baseline_sql":"SELECT d.id, d.name, COUNT(DISTINCT la.id) AS unused_license_count, COUNT(DISTINCT st.id) AS open_ticket_count FROM departments d JOIN license_assignments la ON la.department_id = d.id JOIN support_tickets st ON st.department_id = d.id WHERE la.status = 'active' AND la.is_mandatory = false AND (la.last_used_at IS NULL OR la.last_used_at < CURRENT_TIMESTAMP - INTERVAL '60 days') AND st.status IN ('open', 'in_progress') GROUP BY d.id, d.name ORDER BY d.name","requires_join":true,"clarification_expected":false,"security_sensitive":false,"comparison_mode":"grouped_rows","numeric_tolerance":null,"stable_key_columns":[],"template_id":null},
    {"id":"itops-hard-004","question":"Which users have failed login spikes and are members of privileged groups?","category":"risk","difficulty":"hard","case_type":"free_query","requesting_role":"analyst","required_scope_type":"department","scope_mode":"assigned","expected_outcome":"success","expected_tables":["groups","login_events","user_group_memberships"],"expected_columns":{"groups":["id","is_privileged"],"login_events":["user_id","event_type","occurred_at"],"user_group_memberships":["user_id","group_id"]},"baseline_sql":"SELECT le.user_id, COUNT(DISTINCT le.id) AS failed_login_count FROM login_events le JOIN user_group_memberships ugm ON ugm.user_id = le.user_id JOIN groups g ON g.id = ugm.group_id WHERE le.event_type = 'failed' AND le.occurred_at >= CURRENT_TIMESTAMP - INTERVAL '30 days' AND g.is_privileged = true GROUP BY le.user_id HAVING COUNT(DISTINCT le.id) > 5 ORDER BY le.user_id","requires_join":true,"clarification_expected":false,"security_sensitive":true,"comparison_mode":"grouped_rows","numeric_tolerance":null,"stable_key_columns":[],"template_id":null},
    {"id":"itops-hard-005","question":"Which devices assigned to inactive users have unsupported high-risk software?","category":"risk","difficulty":"hard","case_type":"free_query","requesting_role":"analyst","required_scope_type":"department","scope_mode":"assigned","expected_outcome":"success","expected_tables":["devices","directory_users","software_installs"],"expected_columns":{"devices":["id","assigned_user_id"],"directory_users":["id","last_login_at"],"software_installs":["device_id","is_unsupported","risk_level"]},"baseline_sql":"SELECT DISTINCT d.id AS device_id, du.id AS user_id FROM devices d JOIN directory_users du ON du.id = d.assigned_user_id JOIN software_installs si ON si.device_id = d.id WHERE (du.last_login_at IS NULL OR du.last_login_at < CURRENT_TIMESTAMP - INTERVAL '90 days') AND si.is_unsupported = true AND si.risk_level = 'high' ORDER BY d.id","requires_join":true,"clarification_expected":false,"security_sensitive":true,"comparison_mode":"stable_keys","numeric_tolerance":null,"stable_key_columns":["device_id"],"template_id":null},
    {"id":"itops-hard-006","question":"Which license products have the highest reclaim opportunity excluding mandatory and exception assignments?","category":"licenses","difficulty":"hard","case_type":"free_query","requesting_role":"admin","required_scope_type":"global","scope_mode":"global","expected_outcome":"success","expected_tables":["license_assignments","licenses"],"expected_columns":{"license_assignments":["license_id","status","is_mandatory","is_exception","last_used_at"],"licenses":["id","product_name","monthly_cost_usd"]},"baseline_sql":"SELECT l.product_name, COUNT(*) AS reclaim_count, SUM(l.monthly_cost_usd) AS monthly_savings FROM license_assignments la JOIN licenses l ON l.id = la.license_id WHERE la.status = 'active' AND la.is_mandatory = false AND la.is_exception = false AND (la.last_used_at IS NULL OR la.last_used_at < CURRENT_TIMESTAMP - INTERVAL '60 days') GROUP BY l.product_name ORDER BY monthly_savings DESC, l.product_name","requires_join":true,"clarification_expected":false,"security_sensitive":false,"comparison_mode":"ordered_rows","numeric_tolerance":"0.01","stable_key_columns":[],"template_id":null},
    {"id":"itops-hard-007","question":"Which inactive human users would require policy review before disablement?","category":"risk","difficulty":"hard","case_type":"free_query","requesting_role":"admin","required_scope_type":"global","scope_mode":"global","expected_outcome":"success","expected_tables":["directory_users","groups","security_events","user_group_memberships"],"expected_columns":{"directory_users":["id","account_type","account_status","last_login_at"],"groups":["id","is_privileged"],"security_events":["user_id","severity","status"],"user_group_memberships":["user_id","group_id"]},"baseline_sql":"SELECT DISTINCT du.id FROM directory_users du LEFT JOIN user_group_memberships ugm ON ugm.user_id = du.id LEFT JOIN groups g ON g.id = ugm.group_id LEFT JOIN security_events se ON se.user_id = du.id WHERE du.account_type = 'human' AND du.account_status = 'active' AND (du.last_login_at IS NULL OR du.last_login_at < CURRENT_TIMESTAMP - INTERVAL '90 days') AND (g.is_privileged = true OR (se.severity = 'critical' AND se.status IN ('open', 'investigating'))) ORDER BY du.id","requires_join":true,"clarification_expected":false,"security_sensitive":true,"comparison_mode":"stable_keys","numeric_tolerance":null,"stable_key_columns":["id"],"template_id":null},
    {"id":"itops-hard-008","question":"Which devices have not reported recently and are linked to unresolved critical security events?","category":"security","difficulty":"hard","case_type":"free_query","requesting_role":"analyst","required_scope_type":"department","scope_mode":"assigned","expected_outcome":"success","expected_tables":["devices","security_events"],"expected_columns":{"devices":["id","last_seen_at"],"security_events":["device_id","severity","status"]},"baseline_sql":"SELECT DISTINCT d.id FROM devices d JOIN security_events se ON se.device_id = d.id WHERE (d.last_seen_at IS NULL OR d.last_seen_at < CURRENT_TIMESTAMP - INTERVAL '30 days') AND se.severity = 'critical' AND se.status IN ('open', 'investigating') ORDER BY d.id","requires_join":true,"clarification_expected":false,"security_sensitive":true,"comparison_mode":"stable_keys","numeric_tolerance":null,"stable_key_columns":["id"],"template_id":null},
    {"id":"itops-hard-009","question":"Which groups have had the most membership additions in the last 30 days?","category":"access","difficulty":"hard","case_type":"free_query","requesting_role":"admin","required_scope_type":"global","scope_mode":"global","expected_outcome":"success","expected_tables":["groups","user_group_memberships"],"expected_columns":{"groups":["id","name"],"user_group_memberships":["group_id","added_at"]},"baseline_sql":"SELECT g.id, g.name, COUNT(*) AS addition_count FROM groups g JOIN user_group_memberships ugm ON ugm.group_id = g.id WHERE ugm.added_at >= CURRENT_TIMESTAMP - INTERVAL '30 days' GROUP BY g.id, g.name ORDER BY addition_count DESC, g.name","requires_join":true,"clarification_expected":false,"security_sensitive":true,"comparison_mode":"ordered_rows","numeric_tolerance":null,"stable_key_columns":[],"template_id":null},
    {"id":"itops-hard-010","question":"Which departments have the highest concentration of risky devices and inactive users?","category":"risk","difficulty":"hard","case_type":"free_query","requesting_role":"admin","required_scope_type":"global","scope_mode":"global","expected_outcome":"success","expected_tables":["departments","devices","directory_users"],"expected_columns":{"departments":["id","name"],"devices":["department_id","compliance_status"],"directory_users":["department_id","last_login_at"]},"baseline_sql":"SELECT d.id, d.name, COUNT(DISTINCT dv.id) AS risky_device_count, COUNT(DISTINCT du.id) AS inactive_user_count FROM departments d LEFT JOIN devices dv ON dv.department_id = d.id AND dv.compliance_status = 'non_compliant' LEFT JOIN directory_users du ON du.department_id = d.id AND (du.last_login_at IS NULL OR du.last_login_at < CURRENT_TIMESTAMP - INTERVAL '90 days') GROUP BY d.id, d.name ORDER BY risky_device_count DESC, inactive_user_count DESC, d.name","requires_join":true,"clarification_expected":false,"security_sensitive":true,"comparison_mode":"ordered_rows","numeric_tolerance":null,"stable_key_columns":[],"template_id":null},


    {"id":"itops-medium-001","question":"Show unused paid licenses in my department.","category":"licenses","difficulty":"medium","case_type":"template_query","requesting_role":"manager","required_scope_type":"department","scope_mode":"assigned","expected_outcome":"success","expected_tables":["license_assignments","licenses"],"expected_columns":{"license_assignments":["id","user_id","license_id","status","is_mandatory","last_used_at"],"licenses":["id","product_name","vendor","monthly_cost_usd"]},"baseline_sql":"SELECT la.id, la.user_id, l.product_name, l.vendor, l.monthly_cost_usd, la.last_used_at FROM license_assignments la JOIN licenses l ON l.id = la.license_id WHERE la.status = 'active' AND la.is_mandatory = false AND (la.last_used_at IS NULL OR la.last_used_at < CURRENT_TIMESTAMP - INTERVAL '60 days') ORDER BY l.product_name, la.last_used_at NULLS FIRST","requires_join":true,"clarification_expected":false,"security_sensitive":false,"comparison_mode":"stable_keys","numeric_tolerance":"0.01","stable_key_columns":["id"],"template_id":"unused_licenses_by_department"},
    {"id":"itops-medium-002","question":"Show privileged group memberships in my department.","category":"access","difficulty":"medium","case_type":"template_query","requesting_role":"analyst","required_scope_type":"department","scope_mode":"assigned","expected_outcome":"success","expected_tables":["groups","user_group_memberships"],"expected_columns":{"groups":["id","name","risk_level","is_privileged"],"user_group_memberships":["group_id"]},"baseline_sql":"SELECT g.name, g.risk_level, COUNT(*) AS member_count FROM groups g JOIN user_group_memberships ugm ON ugm.group_id = g.id WHERE g.is_privileged = true GROUP BY g.name, g.risk_level ORDER BY g.risk_level, g.name","requires_join":true,"clarification_expected":false,"security_sensitive":true,"comparison_mode":"grouped_rows","numeric_tolerance":null,"stable_key_columns":[],"template_id":"privileged_group_memberships_by_department"},
    {"id":"itops-medium-003","question":"Show inactive users who still have active paid licenses.","category":"licenses","difficulty":"medium","case_type":"free_query","requesting_role":"analyst","required_scope_type":"department","scope_mode":"assigned","expected_outcome":"success","expected_tables":["directory_users","license_assignments","licenses"],"expected_columns":{"directory_users":["id","last_login_at"],"license_assignments":["id","user_id","license_id","status"],"licenses":["id","product_name","monthly_cost_usd"]},"baseline_sql":"SELECT du.id AS user_id, la.id AS assignment_id, l.product_name, l.monthly_cost_usd FROM directory_users du JOIN license_assignments la ON la.user_id = du.id JOIN licenses l ON l.id = la.license_id WHERE la.status = 'active' AND (du.last_login_at IS NULL OR du.last_login_at < CURRENT_TIMESTAMP - INTERVAL '90 days') ORDER BY du.id, la.id","requires_join":true,"clarification_expected":false,"security_sensitive":false,"comparison_mode":"unordered_rows","numeric_tolerance":"0.01","stable_key_columns":[],"template_id":null},
    {"id":"itops-medium-004","question":"Show high-confidence unused licenses by product.","category":"licenses","difficulty":"medium","case_type":"free_query","requesting_role":"analyst","required_scope_type":"department","scope_mode":"assigned","expected_outcome":"success","expected_tables":["license_assignments","licenses"],"expected_columns":{"license_assignments":["license_id","status","is_mandatory","is_exception","last_used_at"],"licenses":["id","product_name","monthly_cost_usd"]},"baseline_sql":"SELECT l.product_name, COUNT(*) AS assignment_count, SUM(l.monthly_cost_usd) AS monthly_savings FROM license_assignments la JOIN licenses l ON l.id = la.license_id WHERE la.status = 'active' AND la.is_mandatory = false AND la.is_exception = false AND (la.last_used_at IS NULL OR la.last_used_at < CURRENT_TIMESTAMP - INTERVAL '90 days') GROUP BY l.product_name ORDER BY l.product_name","requires_join":true,"clarification_expected":false,"security_sensitive":false,"comparison_mode":"grouped_rows","numeric_tolerance":"0.01","stable_key_columns":[],"template_id":null},

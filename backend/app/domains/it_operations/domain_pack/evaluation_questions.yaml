    {"id":"itops-medium-013","question":"Show devices that have not reported in 30 days and have open security events.","category":"security","difficulty":"medium","case_type":"free_query","requesting_role":"analyst","required_scope_type":"department","scope_mode":"assigned","expected_outcome":"success","expected_tables":["devices","security_events"],"expected_columns":{"devices":["id","hostname","last_seen_at"],"security_events":["device_id","status"]},"baseline_sql":"SELECT DISTINCT d.id, d.hostname, d.last_seen_at FROM devices d JOIN security_events se ON se.device_id = d.id WHERE (d.last_seen_at IS NULL OR d.last_seen_at < CURRENT_TIMESTAMP - INTERVAL '30 days') AND se.status IN ('open', 'investigating') ORDER BY d.id","requires_join":true,"clarification_expected":false,"security_sensitive":true,"comparison_mode":"stable_keys","numeric_tolerance":null,"stable_key_columns":["id"],"template_id":null},
